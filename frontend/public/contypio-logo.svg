<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-label="contypio logo light">
  <defs>
    <linearGradient id="contypioGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#49D6C8"/>
      <stop offset="100%" stop-color="#2A6FB0"/>
    </linearGradient>
  </defs>

  <!-- icon -->
  <g transform="translate(24,20)">
