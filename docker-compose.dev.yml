# Contypio CMS — Development Overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# API + Admin:  http://localhost:3000
# PostgreSQL:   localhost:7460 (for DB tools)

services:
  postgres:
    ports:
      - "7460:5432"

  api:
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8060", "--reload"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
