# Contypio CMS — Docker Compose
#
# Quick start:
#   docker compose up -d
#
# Admin UI + API:  http://localhost:3000
# API Docs:        http://localhost:3000/docs
# Delivery API:    http://localhost:3000/content/
#
# Two containers: postgres + api (serves Admin UI + API from one process).

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contypio}
      POSTGRES_USER: ${POSTGRES_USER:-contypio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contypio}
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=und"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contypio} -d ${POSTGRES_DB:-contypio}"]
      interval: 5s
      retries: 5
    networks:
      - contypio

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${CONTYPIO_PORT:-3000}:8060"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contypio}:${POSTGRES_PASSWORD:-contypio}@postgres:5432/${POSTGRES_DB:-contypio}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: '["http://localhost:${CONTYPIO_PORT:-3000}"]'
      UPLOAD_DIR: /app/uploads
      API_ASSET_URL: http://localhost:${CONTYPIO_PORT:-3000}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-default}
      DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-My Website}
      DEFAULT_TENANT_DOMAIN: ${DEFAULT_TENANT_DOMAIN:-localhost}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@localhost}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Admin}
      SEED_DEMO: ${SEED_DEMO:-false}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contypio

volumes:
  pgdata:
  uploads:

networks:
  contypio:
